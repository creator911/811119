<div class="export-popup" id="export-container"></div>
<script>
function upexport() {
    $(".h-select > a").removeClass("on");
    $(".h-select > div").hide();
    var container = $("#export-container");
    
    // 清空容器并显示
    container.empty().css({display: "flex"});
    
    $.ajax({
        url: '/export_handler.php', // 后端处理脚本
        method: 'GET',
        success: function(data) {
            container.html(data); // 将后端返回的内容插入容器
        },
        error: function() {
            container.html('<p>加载失败，请稍后重试。</p>');
        }
    });
}

function closeExport() {
    $("#export-container").css({display: "none"});
}
</script>
