server {
    listen 80;
    listen [::]:80;
    server_name mycandycast.com www.mycandycast.com;
    return 301 https://mycandycast.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.mycandycast.com;

    ssl_certificate /etc/letsencrypt/live/mycandycast.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mycandycast.com/privkey.pem;
    return 301 https://mycandycast.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mycandycast.com;

    ssl_certificate /etc/letsencrypt/live/mycandycast.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mycandycast.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 4m;

    location / {
        proxy_pass http://127.0.0.1:8770;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
